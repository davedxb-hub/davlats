<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels — Davlat Olimjonov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0908;
    --accent: #b8532f;
    --text: #f2ede8;
    --text-2: rgba(242,237,232,0.55);
    --line: rgba(242,237,232,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; cursor:none; }
  html { scroll-behavior:smooth; }
  body { background: var(--bg); color: var(--text); font-family:'Inter', sans-serif; overflow-x:hidden; }
  a { color:inherit; text-decoration:none; }
  .display { font-family:'Bebas Neue', sans-serif; letter-spacing:1.5px; }

  #cursorDot { position:fixed; top:0; left:0; width:10px; height:10px; border-radius:50%; background:#fff; pointer-events:none; z-index:9999; transform: translate(-50%,-50%); transition: width .25s ease, height .25s ease; }
  #cursorRing { position:fixed; top:0; left:0; width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,0.5); pointer-events:none; z-index:9998; transform: translate(-50%,-50%); transition: width .3s ease, height .3s ease, border-color .3s ease, background .3s ease; }
  body.cursor-hover #cursorDot { width:0; height:0; }
  body.cursor-hover #cursorRing { width:58px; height:58px; background: var(--accent); border-color: var(--accent); }
  #cursorRing::after { content:''; position:absolute; top:50%; left:50%; width:10px; height:10px; border-top:2px solid #fff; border-right:2px solid #fff; transform: translate(-50%,-50%) rotate(45deg); opacity:0; transition: opacity .2s ease; }
  body.cursor-hover #cursorRing::after { opacity:1; }
  @media (hover:none) { #cursorDot, #cursorRing { display:none; } * { cursor:auto !important; } }

  nav { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; justify-content:space-between; align-items:center; padding:20px 5%; background: rgba(13,9,8,0.85); backdrop-filter: blur(10px); border-bottom:1px solid var(--line); }
  .logo { font-size:14px; font-weight:600; letter-spacing:0.5px; }
  .nav-links { display:flex; gap:30px; font-size:13px; color: var(--text-2); }

  .container { max-width:1400px; margin:0 auto; padding:0 5%; }

  .page-head { padding: 150px 0 60px; }
  .back-link { font-size:13px; color: var(--text-2); display:inline-flex; align-items:center; gap:8px; margin-bottom:24px; }
  .back-link:hover { color: var(--accent); }
  .page-head h1 { font-family:'Bebas Neue',sans-serif; letter-spacing:2px; font-size: clamp(50px,10vw,110px); line-height:0.95; }
  .page-head p { color: var(--text-2); font-size:15px; max-width:56ch; margin-top:16px; }

  .reel-grid { display:grid; grid-template-columns: repeat(3,1fr); gap:20px; padding-bottom:120px; }
  @media (max-width:900px){ .reel-grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:600px){ .reel-grid{ grid-template-columns:1fr; } }
  .reel-card { position:relative; aspect-ratio:9/16; border-radius:10px; overflow:hidden; cursor:pointer; background: linear-gradient(160deg,#3a120c,#1c0a08); }
  .reel-card .info { position:absolute; left:0; right:0; bottom:0; padding:16px; background: linear-gradient(to top, rgba(10,5,5,0.9), transparent); }
  .reel-card .tag { font-size:11px; color: var(--accent); letter-spacing:1px; text-transform:uppercase; }
  .reel-card h3 { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:1px; margin-top:4px; }
  .reel-card .play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; font-size:15px; }

  footer { padding:50px 0; border-top:1px solid var(--line); text-align:center; color: var(--text-2); font-size:13px; }

  .reveal { opacity:0; transform:translateY(30px); transition:opacity .8s ease-out, transform .8s ease-out; }
  .reveal.in { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="cursorDot"></div>
<div id="cursorRing"></div>

<nav>
  <div class="logo">DAVLAT OLIMJONOV</div>
  <div class="nav-links">
    <a href="index.html#services" class="hoverable">Services</a>
    <a href="index.html#work" class="hoverable">Work</a>
    <a href="index.html#contact" class="hoverable">Contact</a>
  </div>
</nav>

<div class="container">
  <div class="page-head reveal">
    <a class="back-link hoverable" href="index.html">← All Services</a>
    <h1 class="display">Reels</h1>
    <p>Short-form vertical video, shot and edited for one listing or moment — delivered ready to post the same day.</p>
  </div>

  <div class="reel-grid" id="reelGrid"></div>
</div>

<footer>© 2026 Davlat Olimjonov — Dubai, UAE</footer>

<div class="lightbox" id="lightbox" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px;">
  <div style="position:relative;width:100%;max-width:420px;">
    <button id="lightboxClose" style="position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:none;">×</button>
    <div id="lightboxInner" style="width:100%;aspect-ratio:9/16;background:#000;border-radius:10px;overflow:hidden;"></div>
  </div>
</div>

<script>
  const dot = document.getElementById('cursorDot');
  const ring = document.getElementById('cursorRing');
  let mouseX=0, mouseY=0, ringX=0, ringY=0;
  window.addEventListener('mousemove', (e) => {
    mouseX=e.clientX; mouseY=e.clientY;
    dot.style.left=mouseX+'px'; dot.style.top=mouseY+'px';
  });
  (function animateRing(){
    ringX += (mouseX-ringX)*0.18; ringY += (mouseY-ringY)*0.18;
    ring.style.left=ringX+'px'; ring.style.top=ringY+'px';
    requestAnimationFrame(animateRing);
  })();
  function bindHoverables(root=document){
    root.querySelectorAll('a, button, .hoverable').forEach(el=>{
      el.addEventListener('mouseenter', ()=>document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', ()=>document.body.classList.remove('cursor-hover'));
    });
  }
  bindHoverables();

  const revealObserver = new IntersectionObserver((entries)=>{
    entries.forEach(e=>e.target.classList.toggle('in', e.isIntersecting));
  }, {threshold:0.15});
  document.querySelectorAll('.reveal').forEach(el=>revealObserver.observe(el));

  const lightbox = document.getElementById('lightbox');
  const lightboxInner = document.getElementById('lightboxInner');
  function openVideo(url){
    if(!url) return;
    lightboxInner.innerHTML='';
    if(url.includes('instagram.com')){
      const clean = url.split('?')[0].replace(/\/$/,'');
      lightboxInner.innerHTML = `<blockquote class="instagram-media" data-instgrm-permalink="${clean}" style="margin:0;width:100%;"></blockquote>`;
      if(window.instgrm) window.instgrm.Embeds.process();
      else { const s=document.createElement('script'); s.async=true; s.src='//www.instagram.com/embed.js'; document.body.appendChild(s); }
    } else if (url.includes('youtube.com')||url.includes('youtu.be')){
      const id = url.match(/(?:v=|youtu\.be\/|shorts\/)([\w-]+)/)?.[1];
      lightboxInner.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:100%;height:100%;border:0;" allow="autoplay;fullscreen"></iframe>`;
    } else if (url.includes('drive.google.com')){
      const id = url.match(/\/d\/([\w-]+)/)?.[1];
      lightboxInner.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" style="width:100%;height:100%;border:0;" allow="autoplay"></iframe>`;
    } else {
      lightboxInner.innerHTML = `<video src="${url}" controls autoplay style="width:100%;height:100%;"></video>`;
    }
    lightbox.style.display='flex';
  }
  document.getElementById('lightboxClose').addEventListener('click', ()=>{ lightbox.style.display='none'; lightboxInner.innerHTML=''; });

  const REELS = [
    { url:"https://www.instagram.com/reel/DTXTQNMk6P5/", tag:"Riad Gohar × Sahmz", title:"Bayn — 200,000+ views" },
    { url:"https://www.instagram.com/reel/DX9rLGzNCs4/", tag:"Riad Gohar × Ben Bandari", title:"Wilds by Aldar" },
    { url:"https://www.instagram.com/reel/DT20mcljJAd/", tag:"Sahmz × Ayah Aldahabi", title:"Ellington Project B" },
    { url:"https://www.instagram.com/reel/DTkUb__DYqp/", tag:"Riad Gohar", title:"Leadership 1" },
    { url:"https://www.instagram.com/reel/DT1wlJjE2oA/", tag:"Riad Gohar", title:"Leadership 2" },
    { url:"https://www.instagram.com/reel/DTspZ1wE7sv/", tag:"Riad Gohar", title:"Leadership 3" },
    { url:"https://www.instagram.com/reel/DaAmXGwNpKt/", tag:"Riad Gohar", title:"Baccarat" },
    { url:"https://www.instagram.com/reel/DZVF6Soth1C/", tag:"Riad Gohar", title:"Birthday, 2026" },
    { url:"https://youtube.com/shorts/eoJo_1g9AfI", tag:"Riad Gohar", title:"Yas Island" },
    { url:"https://www.instagram.com/reel/DX3otjgNXmg/", tag:"Bakhodur Dubai", title:"Bayn Office" },
    { url:"https://www.instagram.com/reel/DZFX5UTshDj/", tag:"Bakhodur Dubai", title:"Jad" },
    { url:"https://www.instagram.com/reel/DZXnlGooDUO/", tag:"Jonick Realestate", title:"Life" },
  ];
  const reelGrid = document.getElementById('reelGrid');
  REELS.forEach((item, i)=>{
    const card = document.createElement('div');
    card.className = 'reel-card hoverable reveal';
    card.style.transitionDelay = (i % 6 * 0.06) + 's';
    card.innerHTML = `<div class="play">▶</div><div class="info"><div class="tag">${item.tag}</div><h3>${item.title}</h3></div>`;
    card.addEventListener('click', ()=>openVideo(item.url));
    reelGrid.appendChild(card);
    revealObserver.observe(card);
  });
  bindHoverables(reelGrid);
</script>

</body>
</html>
